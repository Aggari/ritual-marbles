:root {
  --mint-1: #e8f5f0;
  --mint-2: #c2e8db;
  --mint-3: #8dd4bc;
  --mint-4: #5cb89a;
  --mint-5: #3d9e82;
  --mint-6: #2d7d66;
  --mint-glow: #6eecc8;
  --bg: #0e1e19;
  --bg-card: rgba(14, 30, 25, 0.88);
  --gold: #d4a843;
  --gold-light: #f0d68a;
  --text: #ddf0e8;
  --text-dim: #7aad97;
  --glow-soft: rgba(110, 236, 200, 0.25);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  overflow: hidden;
  touch-action: none;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  overflow: hidden;
  height: 100dvh;
  position: relative;
}

/* ─── Header ─── */
.header {
  position: relative;
  z-index: 10;
  text-align: center;
  padding: 6px 0 2px;
  width: 100%;
}

.title {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(16px, 3.5vw, 24px);
  color: var(--mint-glow);
  text-shadow: 0 0 24px var(--glow-soft);
  letter-spacing: 4px;
}

.subtitle {
  font-size: 10px;
  color: var(--text-dim);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 1px;
  font-weight: 300;
}


.credit {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 1.5px;
  margin-top: 1px;
  font-weight: 300;
  opacity: 0.7;
}

/* ─── Score Bar ─── */
.score-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 4px 0;
  position: relative;
  z-index: 10;
}

.stat {
  text-align: center;
}

.stat-label {
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text-dim);
  font-weight: 300;
}

.stat-value {
  font-family: 'Cinzel Decorative', serif;
  font-size: 17px;
  color: var(--gold-light);
  text-shadow: 0 0 8px rgba(212,168,67,0.25);
}

/* ─── Game Board ─── */
.game-wrap {
  position: relative;
  z-index: 10;
  width: min(88vw, 380px);
  aspect-ratio: 6 / 8;
  max-height: calc(100dvh - 180px);
  margin: 4px auto;
  flex-shrink: 1;
}

.board {
  width: 100%;
  height: 100%;
  background: var(--bg-card);
  border: 1px solid rgba(141, 212, 188, 0.12);
  border-radius: 14px;
  position: relative;
  overflow: hidden;
  box-shadow:
    0 0 40px rgba(110, 236, 200, 0.06),
    inset 0 0 80px rgba(14, 30, 25, 0.6);
}

/* Grid lines */
.grid-line-h, .grid-line-v {
  position: absolute;
  pointer-events: none;
  background: rgba(141, 212, 188, 0.04);
}
.grid-line-h { height: 1px; width: 100%; left: 0; }
.grid-line-v { width: 1px; height: 100%; top: 0; }

/* Drop indicator column */
.drop-col {
  position: absolute;
  top: 0;
  height: 100%;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.15s ease, left 0.1s ease;
  background: linear-gradient(to bottom,
    rgba(110, 236, 200, 0.12),
    rgba(110, 236, 200, 0.02) 50%,
    transparent);
}

.drop-col.active { opacity: 1; }

/* Preview orb at top of drop column */
.drop-preview {
  position: absolute;
  top: 4px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 15;
  opacity: 0;
  transition: opacity 0.15s ease, left 0.1s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.drop-preview.active { opacity: 0.7; }

/* ─── Orb ─── */
.orb {
  position: absolute;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
  -webkit-user-select: none;
  transition: top 0.18s cubic-bezier(.4,0,.2,1), left 0.08s ease;
  z-index: 10;
}

.orb.dropping {
  transition: top 0.22s cubic-bezier(.4,0,.6,1);
}

.orb.merging {
  transition: all 0.2s ease;
  transform: scale(1.3);
  opacity: 0;
  z-index: 20;
}

.orb-inner {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.orb-num {
  font-family: 'Cinzel Decorative', serif;
  font-weight: 700;
  position: relative;
  z-index: 2;
}

.orb-shine {
  position: absolute;
  top: 14%;
  left: 18%;
  width: 32%;
  height: 26%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.45), transparent);
  border-radius: 50%;
  transform: rotate(-25deg);
  pointer-events: none;
}

/* Tier styles */
.orb[data-t="1"] .orb-inner { background: radial-gradient(circle at 32% 32%, #e8f5f0, #c2e8db); }
.orb[data-t="1"] { box-shadow: 0 2px 8px rgba(194,232,219,0.35); }
.orb[data-t="1"] .orb-num { color: #1a4a3a; }

.orb[data-t="2"] .orb-inner { background: radial-gradient(circle at 32% 32%, #b8edd8, #8dd4bc); }
.orb[data-t="2"] { box-shadow: 0 2px 10px rgba(141,212,188,0.4); }
.orb[data-t="2"] .orb-num { color: #1a4a3a; }

.orb[data-t="3"] .orb-inner { background: radial-gradient(circle at 32% 32%, #7ee8c0, #5cb89a); }
.orb[data-t="3"] { box-shadow: 0 2px 12px rgba(92,184,154,0.45); }
.orb[data-t="3"] .orb-num { color: #0e2a20; }

.orb[data-t="4"] .orb-inner { background: radial-gradient(circle at 32% 32%, #5cd6a8, #3d9e82); }
.orb[data-t="4"] { box-shadow: 0 3px 14px rgba(61,158,130,0.5); }
.orb[data-t="4"] .orb-num { color: #e8f5f0; }

.orb[data-t="5"] .orb-inner { background: radial-gradient(circle at 32% 32%, #40c898, #2d7d66); }
.orb[data-t="5"] { box-shadow: 0 3px 16px rgba(45,125,102,0.55); }
.orb[data-t="5"] .orb-num { color: #e8f5f0; }

.orb[data-t="6"] .orb-inner { background: radial-gradient(circle at 32% 32%, var(--gold-light), var(--gold)); }
.orb[data-t="6"] { box-shadow: 0 3px 18px rgba(212,168,67,0.5); }
.orb[data-t="6"] .orb-num { color: #2a1a00; }

.orb[data-t="7"] .orb-inner { background: radial-gradient(circle at 32% 32%, #f5d090, #c48a3a); }
.orb[data-t="7"] { box-shadow: 0 3px 20px rgba(196,138,58,0.55), 0 0 30px rgba(212,168,67,0.2); }
.orb[data-t="7"] .orb-num { color: #2a1a00; }

.orb[data-t="8"] .orb-inner { background: radial-gradient(circle at 32% 32%, #ffb8e8, #c85a9a); }
.orb[data-t="8"] { box-shadow: 0 3px 22px rgba(200,90,154,0.5), 0 0 35px rgba(255,184,232,0.15); }
.orb[data-t="8"] .orb-num { color: #fff; }

.orb[data-t="9"] .orb-inner { background: radial-gradient(circle at 32% 32%, #d8b8ff, #8a5ac8); }
.orb[data-t="9"] { box-shadow: 0 3px 24px rgba(138,90,200,0.5), 0 0 40px rgba(216,184,255,0.15); }
.orb[data-t="9"] .orb-num { color: #fff; }

.orb[data-t="10"] .orb-inner { background: radial-gradient(circle at 32% 32%, #ff8888, #c83030); }
.orb[data-t="10"] { box-shadow: 0 3px 26px rgba(200,48,48,0.5), 0 0 45px rgba(255,136,136,0.2); }
.orb[data-t="10"] .orb-num { color: #fff; }

// ═══════════════════════ AUDIO ENGINE (Web Audio API) ═══════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx = null;
let soundOn = true;

function ensureAudio() {
  if (!actx) actx = new AudioCtx();
  if (actx.state === 'suspended') actx.resume();
}

function playTone(freq, dur, type = 'sine', vol = 0.12) {
  if (!soundOn || !actx) return;
  try {
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, actx.currentTime);
    gain.gain.setValueAtTime(vol, actx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    osc.connect(gain);
    gain.connect(actx.destination);
    osc.start();
    osc.stop(actx.currentTime + dur);
  } catch(e) {}
}

function sfxDrop() {
  playTone(320, 0.08, 'triangle', 0.08);
  setTimeout(() => playTone(220, 0.12, 'sine', 0.06), 40);
}

function sfxMerge(tier) {
  const base = 300 + tier * 60;
  playTone(base, 0.15, 'sine', 0.14);
  setTimeout(() => playTone(base * 1.25, 0.12, 'triangle', 0.10), 60);
  setTimeout(() => playTone(base * 1.5, 0.18, 'sine', 0.08), 120);
}

function sfxChain(combo) {
  const base = 400 + combo * 80;
  playTone(base, 0.2, 'sine', 0.15);
  setTimeout(() => playTone(base * 1.33, 0.15, 'triangle', 0.12), 70);
  setTimeout(() => playTone(base * 1.66, 0.25, 'sine', 0.10), 140);
}

function sfxGameOver() {
  playTone(300, 0.3, 'sine', 0.12);
  setTimeout(() => playTone(250, 0.3, 'sine', 0.10), 200);
  setTimeout(() => playTone(180, 0.5, 'triangle', 0.08), 400);
}


function sfxMystery() {
  playTone(500, 0.1, 'sine', 0.10);
  setTimeout(() => playTone(600, 0.1, 'triangle', 0.08), 80);
  setTimeout(() => playTone(800, 0.15, 'sine', 0.12), 160);
  setTimeout(() => playTone(1000, 0.2, 'triangle', 0.10), 240);

const MYSTERY_CHANCE = 0.13; // 13% chance of mystery orb

const ROMAN = ['I','II','III','IV','V','VI','VII','VIII','IX','X','XI'];
const TIER_COLORS = [
  '#c2e8db','#8dd4bc','#5cb89a','#3d9e82','#2d7d66',
  '#d4a843','#c48a3a','#c85a9a','#8a5ac8','#c83030','#e0e0e0'
];

// ═══════════════════════ GAME STATE ═══════════════════════
let grid, pts, bestPts, alive, nextT, curCol, busy;
let mysteryMap = {}; // key: 'r,c' => image index if mystery, undefined if normal
let nextIsMystery = false;
let nextMysteryImg = 0;
let boardEl, dropColEl, dropPreviewEl, overlayEl, finalScoreEl;
let cW, cH, orbSz;

function init() {
  boardEl = document.getElementById('board');
  dropColEl = document.getElementById('dropCol');
  dropPreviewEl = document.getElementById('dropPreview');
  overlayEl = document.getElementById('overlay');
  finalScoreEl = document.getElementById('endScore');

  bestPts = parseInt(localStorage.getItem('ritualBest') || '0');
  document.getElementById('best').textContent = bestPts;

  drawGridLines();
  wireInput();
  initLobby();
}

function restart() {
  grid = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  mysteryMap = {};
  nextIsMystery = Math.random() < MYSTERY_CHANCE;
  nextMysteryImg = Math.floor(Math.random() * ORB_IMGS.length);
  pts = 0;
  alive = true;
  curCol = 3;
  busy = false;
  nextT = rndTier();
  overlayEl.classList.remove('show');
  updScore();
  updNext();
  render();
}

function rndTier() {
  const r = Math.random();
  if (r < 0.32) return 1;
  if (r < 0.62) return 2;
  if (r < 0.84) return 3;
  return 4;
}

function measure() {
  const r = boardEl.getBoundingClientRect();
  cW = r.width / COLS;
  cH = r.height / ROWS;
  orbSz = Math.min(cW, cH) * 0.80;
}

function drawGridLines() {
  measure();
  for (let i = 1; i < ROWS; i++) {
    const l = document.createElement('div');
    l.className = 'grid-line-h';
    l.style.top = (i * cH) + 'px';
    boardEl.appendChild(l);
  }
  for (let i = 1; i < COLS; i++) {
    const l = document.createElement('div');
    l.className = 'grid-line-v';
    l.style.left = (i * cW) + 'px';
    boardEl.appendChild(l);
  }
}

// ═══════════════════════ RENDERING ═══════════════════════
function render() {
  measure();
  boardEl.querySelectorAll('.orb').forEach(e => e.remove());
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] > 0) makeOrb(r, c, grid[r][c]);
}

function makeOrb(row, col, tier) {
  const el = document.createElement('div');
  el.className = 'orb';
  const t = Math.min(tier, 11);
  el.dataset.t = t;
  el.style.width = el.style.height = orbSz + 'px';
  el.style.left = (col * cW + (cW - orbSz) / 2) + 'px';
  el.style.top = (row * cH + (cH - orbSz) / 2) + 'px';
  const mKey = row + ',' + col;
  if (mysteryMap[mKey] !== undefined) {
    // Mystery orb - show character image with ? badge
    const imgIdx = mysteryMap[mKey];
    el.innerHTML = `<div class="orb-inner" style="padding:0;overflow:hidden"><img src="${ORB_IMGS[imgIdx]}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;pointer-events:none;display:block;" /><div class="mystery-badge">?</div></div>`;
    el.classList.add('mystery');
  } else {
    const fs = orbSz * (tier >= 10 ? 0.24 : tier >= 7 ? 0.28 : 0.35);
    el.innerHTML = `<div class="orb-inner"><span class="orb-num" style="font-size:${fs}px">${1 << tier}</span><div class="orb-shine"></div></div>`;
  }
  boardEl.appendChild(el);
  return el;
}

function updScore() {
  document.getElementById('score').textContent = pts;
  if (pts > bestPts) {
    bestPts = pts;
    document.getElementById('best').textContent = bestPts;
    try { localStorage.setItem('ritualBest', bestPts); } catch(e) {}
  }
  let mx = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] > mx) mx = grid[r][c];
  document.getElementById('ritual').textContent = ROMAN[Math.min(mx - 1, 10)] || 'I';
}

function updNext() {
  const el = document.getElementById('nextOrb');
  if (nextIsMystery) {
    el.style.background = 'none';
    el.style.overflow = 'hidden';
    el.innerHTML = `<img src="${ORB_IMGS[nextMysteryImg]}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" /><div style="position:absolute;bottom:-2px;right:-2px;background:var(--gold);color:var(--bg);width:14px;height:14px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:Cinzel Decorative,serif;">?</div>`;
    el.style.position = 'relative';
  } else {
    const t = Math.min(nextT, 11);
    el.style.background = `radial-gradient(circle at 32% 32%, #fff, ${TIER_COLORS[t - 1]})`;
    el.style.overflow = '';
    el.innerHTML = `<span style="font-family:'Cinzel Decorative',serif;font-size:11px;font-weight:700;color:var(--bg)">${1 << nextT}</span>`;
  }
}

function updDropPreview() {
  measure();
  dropColEl.style.left = (curCol * cW) + 'px';
  dropColEl.style.width = cW + 'px';
  dropColEl.classList.add('active');

  const sz = orbSz * 0.7;
  dropPreviewEl.style.width = dropPreviewEl.style.height = sz + 'px';
  dropPreviewEl.style.left = (curCol * cW + (cW - sz) / 2) + 'px';
  if (nextIsMystery) {
    dropPreviewEl.style.background = 'none';
    dropPreviewEl.style.overflow = 'hidden';
    dropPreviewEl.innerHTML = `<img src="${ORB_IMGS[nextMysteryImg]}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;opacity:0.7;" />`;
  } else {
    const t = Math.min(nextT, 11);
    dropPreviewEl.style.background = `radial-gradient(circle at 32% 32%, #fff, ${TIER_COLORS[t - 1]})`;
    dropPreviewEl.style.overflow = '';
    dropPreviewEl.innerHTML = `<span style="font-family:'Cinzel Decorative',serif;font-size:${sz*0.35}px;font-weight:700;color:var(--bg);opacity:0.8">${1 << nextT}</span>`;
  }
  dropPreviewEl.classList.add('active');
}

function hideDropPreview() {
  dropColEl.classList.remove('active');
  dropPreviewEl.classList.remove('active');
}

// ═══════════════════════ DROP & MERGE ═══════════════════════
function drop(col) {
  if (!alive || busy) return;
  ensureAudio();

  let tRow = -1;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (grid[r][col] === 0) { tRow = r; break; }
  }
  if (tRow < 0) return;

  busy = true;
  grid[tRow][col] = nextT;
  if (nextIsMystery) {
    mysteryMap[tRow + ',' + col] = nextMysteryImg;
  }
  sfxDrop();
  nextT = rndTier();
  nextIsMystery = Math.random() < MYSTERY_CHANCE;
  nextMysteryImg = Math.floor(Math.random() * ORB_IMGS.length);
  updNext();
  render();

  setTimeout(() => {
    doMerges(0, () => {
      busy = false;
      checkEnd();
    });
  }, 80);
}

function doMerges(combo, cb) {
  let found = false;

  for (let r = ROWS - 1; r >= 0; r--) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] === 0) continue;
      const v = grid[r][c];
      const nbrs = [];
      if (r + 1 < ROWS && grid[r+1][c] === v) nbrs.push([r+1, c]);
      if (r - 1 >= 0 && grid[r-1][c] === v) nbrs.push([r-1, c]);
      if (c - 1 >= 0 && grid[r][c-1] === v) nbrs.push([r, c-1]);
      if (c + 1 < COLS && grid[r][c+1] === v) nbrs.push([r, c+1]);

      if (nbrs.length > 0) {
        grid[r][c] = v + 1;
        // When merged, always reveal (no longer mystery)
        delete mysteryMap[r + ',' + c];
        for (const [nr, nc] of nbrs) { grid[nr][nc] = 0; delete mysteryMap[nr + ',' + nc]; }

        const earned = (1 << (v + 1)) * nbrs.length;
        pts += earned;
        updScore();

        if (combo > 0) sfxChain(combo);
        else sfxMerge(v);

        fxMerge(r, c, v + 1);
        fxRunes(r, c);
        fxScorePop(r, c, earned);

        found = true;
        break;
      }
    }
    if (found) break;
  }

  if (found) {
    gravity();
    render();
    setTimeout(() => doMerges(combo + 1, cb), 220);
  } else {
    cb();
  }
}

function gravity() {
  for (let c = 0; c < COLS; c++) {
    let w = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][c] !== 0) {
        if (r !== w) {
          grid[w][c] = grid[r][c]; grid[r][c] = 0;
          const mk = r + ',' + c;
          if (mysteryMap[mk] !== undefined) {
            mysteryMap[w + ',' + c] = mysteryMap[mk];
            delete mysteryMap[mk];
          } else {
            delete mysteryMap[w + ',' + c];
          }
        }
        w--;
      }
    }
  }
}

// ═══════════════════════ EFFECTS ═══════════════════════
function fxMerge(row, col, tier) {
  measure();
  const x = col * cW + cW / 2;
  const y = row * cH + cH / 2;
  const sz = orbSz * 0.5;
  const ring = document.createElement('div');
  ring.className = 'merge-ring';
  ring.style.width = ring.style.height = sz + 'px';
  ring.style.left = (x - sz/2) + 'px';
  ring.style.top = (y - sz/2) + 'px';
  ring.style.borderColor = TIER_COLORS[Math.min(tier - 1, 10)];
  boardEl.appendChild(ring);
  setTimeout(() => ring.remove(), 450);
}

function fxRunes(row, col) {
  measure();
  const x = col * cW + cW / 2;
  const y = row * cH + cH / 2;
  for (let i = 0; i < 3; i++) {
    const p = document.createElement('div');
    p.className = 'rune-particle';
    p.textContent = RUNES[Math.floor(Math.random() * RUNES.length)];
    p.style.left = (x + (Math.random() - 0.5) * 50) + 'px';
    p.style.top = (y + (Math.random() - 0.5) * 20) + 'px';
    p.style.color = 'var(--mint-glow)';
    p.style.animationDelay = (i * 0.12) + 's';
    boardEl.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

function fxScorePop(row, col, val) {
  measure();
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.textContent = '+' + val;
  el.style.left = (col * cW + cW / 2 - 20) + 'px';
  el.style.top = (row * cH) + 'px';
  boardEl.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

// ═══════════════════════ GAME OVER ═══════════════════════
function checkEnd() {
  let full = true;
  for (let c = 0; c < COLS; c++) {
    if (grid[0][c] === 0) { full = false; break; }
  }
  if (full) {
    alive = false;
    sfxGameOver();
    onGameOver();
  }
}

// ═══════════════════════ INPUT ═══════════════════════
function wireInput() {
  let tracking = false;

  boardEl.addEventListener('pointerdown', e => {
    if (!alive || busy) return;
    ensureAudio();
    e.preventDefault();
    tracking = true;
    boardEl.setPointerCapture(e.pointerId);
    updCol(e.clientX);
    updDropPreview();
  });

  boardEl.addEventListener('pointermove', e => {
    if (!tracking) return;
    e.preventDefault();
    updCol(e.clientX);
    updDropPreview();
  });

  boardEl.addEventListener('pointerup', e => {
    if (!tracking) return;
    e.preventDefault();
    tracking = false;
    hideDropPreview();
    drop(curCol);
  });

  boardEl.addEventListener('pointercancel', () => {
    tracking = false;
    hideDropPreview();
  });

  document.addEventListener('keydown', e => {
    if (!alive || busy) return;
    ensureAudio();
    if (e.key === 'ArrowLeft') curCol = Math.max(0, curCol - 1);
    else if (e.key === 'ArrowRight') curCol = Math.min(COLS - 1, curCol + 1);
    else if (e.key === ' ' || e.key === 'ArrowDown' || e.key === 'Enter') { drop(curCol); return; }
    updDropPreview();
  });

  document.getElementById('restartBtn').addEventListener('click', restart);
  document.getElementById('startBtn').addEventListener('click', beginFromLobby);
  document.getElementById('lbToggle').addEventListener('click', showInGameLb);
  document.getElementById('lobbyBtn').addEventListener('click', backToLobby);
}

function updCol(clientX) {
  measure();
  const rect = boardEl.getBoundingClientRect();
  const x = clientX - rect.left;
  curCol = Math.max(0, Math.min(COLS - 1, Math.floor(x / cW)));
}

let lbCache = [];

// Listen for realtime updates
lbRef.orderByChild('score').limitToLast(MAX_LB).on('value', (snapshot) => {
  const entries = [];
  snapshot.forEach(child => {
    entries.push(child.val());
  });
  // Sort descending
  entries.sort((a, b) => b.score - a.score);
  lbCache = entries;
  // Update any visible leaderboard
  renderLbList('lobbyLbList', lbCache);
  renderLbList('gameLbList', lbCache);
});

function loadLeaderboard() {
  return lbCache;
}

function saveToLeaderboard(name, score) {
  const now = new Date();
  const dateStr = (now.getMonth()+1) + '/' + now.getDate();
  const entry = { name, score, date: dateStr, timestamp: Date.now() };
  lbRef.push(entry);
  // Optimistic update to cache
  lbCache.push(entry);
  lbCache.sort((a, b) => b.score - a.score);
  lbCache = lbCache.slice(0, MAX_LB);
  return lbCache;
}

function renderLbList(targetId, lb) {
  const el = document.getElementById(targetId);
  if (!lb || lb.length === 0) {
    el.innerHTML = '<div class="lb-empty">No records yet</div>';
    return;
  }
  const medals = ['👑', '⚜', '✧'];
  let html = '';
  lb.forEach((entry, i) => {
    const rc = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : '';
    html += `<div class="lb-row ${rc}">
      <div class="lb-rank">${i+1}</div>
      <div class="lb-medal">${medals[i] || ''}</div>
      <div class="lb-name">${entry.name}</div>
      <div class="lb-score">${entry.score.toLocaleString()}</div>
      <div class="lb-date">${entry.date || ''}</div>
    </div>`;
  });
  el.innerHTML = html;
}

function initLobby() {
  // Leaderboard auto-updates via Firebase listener, just render current cache
  renderLbList('lobbyLbList', lbCache);
  // Try to recover last name from localStorage
  try {
    const last = localStorage.getItem('ritual-last-name');
    if (last) document.getElementById('nameInput').value = last;
  } catch(e) {}
}

function beginFromLobby() {
  ensureAudio();
  const name = document.getElementById('nameInput').value.trim() || 'Oracle';
  playerName = name;
  try { localStorage.setItem('ritual-last-name', name); } catch(e) {}
  document.getElementById('lobbyOverlay').style.display = 'none';
  document.getElementById('lbToggle').classList.add('visible');

  // Show player name
  let np = document.getElementById('nowPlaying');
  if (!np) {
    np = document.createElement('div');
    np.className = 'now-playing';
    np.id = 'nowPlaying';
    document.querySelector('.header').appendChild(np);
  }
  np.innerHTML = `<span class="np-name">${playerName}</span>`;

  restart();
}

function onGameOver() {
  // Save score to persistent leaderboard
  const lb = saveToLeaderboard(playerName, pts);

  // Update game-over overlay with rank info
  const rank = lb.findIndex(e => e.name === playerName && e.score === pts) + 1;
  finalScoreEl.textContent = pts;
  const bestText = pts >= bestPts ? '✦ New Best! ✦' : `Best: ${bestPts}`;
  const rankText = rank > 0 ? ` · Rank #${rank}` : '';
  document.getElementById('endBest').textContent = bestText + rankText;
  overlayEl.classList.add('show');

  // Update in-game leaderboard
  renderLbList('gameLbList', lb);
}

function showInGameLb() {
  const panel = document.getElementById('lbPanel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
}

function backToLobby() {
  overlayEl.classList.remove('show');
  document.getElementById('lbToggle').classList.remove('visible');
  document.getElementById('lbPanel').style.display = 'none';
  const np = document.getElementById('nowPlaying');
  if (np) np.remove();
  document.getElementById('lobbyOverlay').style.display = 'flex';
  initLobby();
  try { document.getElementById('lobbyLogo').style.backgroundImage = `url('data:image/jpeg;base64,${LOGO_B64}')`; } catch(e) {}
}

// ═══════════════════════ START ═══════════════════════
window.addEventListener('load', () => { init(); document.getElementById('nameInput').addEventListener('keydown', e => { if(e.key==='Enter') beginFromLobby(); }); });
window.addEventListener('resize', () => { measure(); drawGridLines(); render(); });
</script>
